services:
  vignette-host:
    build:
      context: ../..
      dockerfile: examples/kitchen-sink/Dockerfile.host
    ports:
      - "4173:4173"
    environment:
      VIGNETTE_ORIGIN: ${VIGNETTE_ORIGIN:-http://127.0.0.1:4173}

  vignette-worker:
    build:
      context: ../..
      dockerfile: examples/kitchen-sink/Dockerfile.obs
    depends_on:
      vignette-host:
        condition: service_healthy
    environment:
      VIGNETTE_RUNTIME_URL: http://vignette-host:4173/runtime
      VIGNETTE_ASSET_ORIGIN: http://vignette-host:4173
      VIGNETTE_OBS_URL: ${VIGNETTE_OBS_URL:-ws://host.docker.internal:4455}
      VIGNETTE_OBS_PASSWORD: ${VIGNETTE_OBS_PASSWORD:-runtime-only}
    extra_hosts:
      - "host.docker.internal:host-gateway"
