name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install OIDC-compatible npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Check release
        run: pnpm ready

      - name: Check release tag
        run: node scripts/check-npm-packages.mjs "${RELEASE_TAG}" --skip-dry-run
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      # pnpm packs rewritten workspace dependencies; npm performs the OIDC-authenticated publishes.
      - name: Publish packages
        run: pnpm publish:npm
